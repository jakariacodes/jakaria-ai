<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jakaria AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0a0a0f;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #ffffff15;
  box-shadow: 0 2px 20px #0005;
}
.avatar {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6c63ff, #3ecf8e);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: bold;
  box-shadow: 0 0 12px #6c63ff55;
}
.header-info h3 { font-size: 16px; font-weight: 600; }
.status { font-size: 12px; color: #3ecf8e; display: flex; align-items: center; gap: 5px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #3ecf8e; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.chat-box {
  flex: 1; overflow-y: auto;
  padding: 20px 16px;
  display: flex; flex-direction: column; gap: 10px;
  background: #0a0a0f;
}
.msg {
  max-width: 78%;
  padding: 11px 16px;
  border-radius: 18px;
  font-size: 14.5px;
  line-height: 1.6;
  word-wrap: break-word;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg.ai {
  background: #1e1e2e;
  border: 1px solid #ffffff10;
  border-radius: 18px 18px 18px 4px;
  align-self: flex-start;
}
.msg.user {
  background: linear-gradient(135deg, #6c63ff, #3ecf8e);
  border-radius: 18px 18px 4px 18px;
  align-self: flex-end;
  color: #fff;
}
.typing-indicator {
  display: none;
  align-items: center; gap: 5px;
  padding: 10px 16px;
  background: #1e1e2e;
  border-radius: 18px 18px 18px 4px;
  align-self: flex-start;
  width: fit-content;
}
.typing-indicator span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #6c63ff;
  animation: bounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
.input-area {
  padding: 14px 16px;
  background: #13131f;
  display: flex; gap: 10px; align-items: center;
  border-top: 1px solid #ffffff10;
}
input {
  flex: 1;
  background: #1e1e2e;
  border: 1px solid #ffffff15;
  border-radius: 25px;
  padding: 12px 20px;
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: border 0.2s;
}
input:focus { border-color: #6c63ff55; }
input::placeholder { color: #555; }
button {
  background: linear-gradient(135deg, #6c63ff, #3ecf8e);
  border: none; border-radius: 50%;
  width: 46px; height: 46px;
  cursor: pointer; font-size: 18px;
  color: #fff;
  box-shadow: 0 4px 15px #6c63ff44;
  transition: transform 0.2s;
}
button:hover { transform: scale(1.08); }
button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">J</div>
  <div class="header-info">
    <h3>Jakaria</h3>
    <div class="status"><div class="dot"></div> এখন সক্রিয়</div>
  </div>
</div>

<div class="chat-box" id="chatBox">
  <div class="msg ai">আসসালামু আলাইকুম! 👋 আমি Jakaria। এখন একটু ব্যস্ত আছি, তবে বলুন — কীভাবে সাহায্য করতে পারি?</div>
  <div class="typing-indicator" id="typing">
    <span></span><span></span><span></span>
  </div>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="মেসেজ লিখুন..." onkeypress="handleKey(event)" />
  <button id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
const history = [];
const chatBox = document.getElementById('chatBox');
const typing = document.getElementById('typing');
const sendBtn = document.getElementById('sendBtn');
const input = document.getElementById('userInput');

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = text;
  chatBox.insertBefore(div, typing);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {
  const msg = input.value.trim();
  if (!msg) return;

  addMessage(msg, 'user');
  input.value = '';
  sendBtn.disabled = true;

  history.push({ role: 'user', parts: [{ text: msg }] });

  typing.style.display = 'flex';
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ history })
    });
    const data = await res.json();
    const reply = data.reply || 'কিছু একটা সমস্যা হয়েছে!';
    history.push({ role: 'model', parts: [{ text: reply }] });
    addMessage(reply, 'ai');
  } catch {
    addMessage('নেটওয়ার্ক সমস্যা, আবার চেষ্টা করো!', 'ai');
  }

  typing.style.display = 'none';
  sendBtn.disabled = false;
  input.focus();
}

function handleKey(e) {
  if (e.key === 'Enter') sendMessage();
}
</script>
</body>
</html>
